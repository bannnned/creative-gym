services:
  postgres:
    image: postgres:16-alpine
    container_name: creative-gym-postgres
    environment:
      POSTGRES_DB: creative_gym
      POSTGRES_USER: creative_gym
      POSTGRES_PASSWORD: creative_gym
    ports:
      - "5432:5432"
    volumes:
      - creative_gym_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creative_gym -d creative_gym"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  creative_gym_postgres_data:
