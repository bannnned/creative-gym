services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: creative_gym
      POSTGRES_USER: creative_gym
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - creative_gym_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creative_gym -d creative_gym"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    environment:
      APP_ENV: production
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://creative_gym:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/creative_gym?sslmode=disable
      DEV_USER_ID: ${DEV_USER_ID:?set DEV_USER_ID}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      API_DOMAIN: ${API_DOMAIN:?set API_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/timeweb/vps/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  creative_gym_postgres_data:
  caddy_data:
  caddy_config:
